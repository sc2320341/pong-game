<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #000;
        }
        canvas {
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10;
        const paddleHeight = 100;
        const player = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff',
            score: 0
        };
        const computer = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff',
            score: 0
        };

        // Create the pong ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 5,
            velocityX: 5,
            velocityY: 5,
            color: '#fff'
        };

        // Draw to canvas
        function drawRect(x, y, w, h, color) {
            context.fillStyle = color;
            context.fillRect(x, y, w, h);
        }

        function drawArc(x, y, r, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, r, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        // Control the player paddle
        canvas.addEventListener('mousemove', getMousePos);

        function getMousePos(event) {
            const rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        }

        document.addEventListener('keydown', controlPaddle);

        function controlPaddle(event) {
            switch(event.key) {
                case 'ArrowUp':
                    player.y -= 20;
                    break;
                case 'ArrowDown':
                    player.y += 20;
                    break;
            }
        }

        // Check for collision
        function collision(ball, paddle) {
            ball.top = ball.y - ball.radius;
            ball.bottom = ball.y + ball.radius;
            ball.left = ball.x - ball.radius;
            ball.right = ball.x + ball.radius;

            paddle.top = paddle.y;
            paddle.bottom = paddle.y + paddle.height;
            paddle.left = paddle.x;
            paddle.right = paddle.x + paddle.width;

            return ball.right > paddle.left && ball.bottom > paddle.top && ball.left < paddle.right && ball.top < paddle.bottom;
        }

        // Update the game
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }

        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // AI control for computer paddle
            computer.y += ((ball.y - (computer.y + computer.height / 2)) * 0.1);

            if (ball.y + ball.radius >= canvas.height || ball.y - ball.radius <= 0) {
                ball.velocityY = -ball.velocityY;
            }

            let playerHit = collision(ball, player);
            let computerHit = collision(ball, computer);

            if (playerHit) {
                ball.velocityX = -ball.velocityX;
                ball.velocityY = (Math.random() * 2 - 1) * ball.speed;
            }
            if (computerHit) {
                ball.velocityX = -ball.velocityX;
                ball.velocityY = (Math.random() * 2 - 1) * ball.speed;
            }

            // Update scores
            if (ball.x - ball.radius < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        // Draw scores
        function draw() {
            drawRect(0, 0, canvas.width, canvas.height, '#000');
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawArc(ball.x, ball.y, ball.radius, ball.color);
            context.fillStyle = '#fff';
            context.font = '35px Arial';
            context.fillText(player.score, canvas.width / 4, canvas.height / 5);
            context.fillText(computer.score, 3 * canvas.width / 4, canvas.height / 5);
        }

        // Game loop
        function game() {
            update();
            draw();
            requestAnimationFrame(game);
        }

        game();
    </script>
</body>
</html>
